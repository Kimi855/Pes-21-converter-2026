<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES 2026 COMPLETE DATABASE</title>
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --cyan: #66fcf1; --blue: #45a29e; --text: #c5c6c7; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: auto; }
        
        .header { background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%); padding: 20px; border-radius: 10px; border: 1px solid var(--blue); text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--cyan); font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        /* CONTROLLI TIPO PES6DB */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { padding: 12px; background: var(--card); color: #fff; border: 1px solid var(--blue); border-radius: 5px; font-size: 14px; outline: none; }
        input { grid-column: span 2; }

        .player-list { background: var(--card); border-radius: 8px; max-height: 250px; overflow-y: auto; border: 1px solid #333; }
        .player-item { padding: 10px 15px; border-bottom: 1px solid #0b0c10; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .player-item:hover { background: var(--blue); color: #000; }
        .ovr-tag { background: #000; color: var(--cyan); padding: 2px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; }

        /* SCHEDA GIOCATORE */
        .player-card { display: none; background: var(--card); border-radius: 10px; padding: 20px; margin-top: 20px; border: 1px solid var(--cyan); position: relative; animation: slideUp 0.4s ease; }
        .photo-section { text-align: center; margin-bottom: 20px; }
        .p-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--cyan); background: #000; object-fit: cover; }
        .p-ovr-big { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: #000; border: 2px solid var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--cyan); font-weight: bold; }

        .p-name { font-size: 26px; text-align: center; color: #fff; margin: 10px 0; text-transform: uppercase; }
        
        .bio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .bio-item b { color: var(--cyan); margin-right: 5px; }
        .flag { width: 20px; vertical-align: middle; margin-right: 5px; }

        .stats-table { width: 100%; border-collapse: collapse; }
        .stat-row { display: flex; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid #2c3531; }
        .stat-val { font-weight: bold; width: 35px; text-align: center; border-radius: 3px; color: #000; font-family: monospace; }

        /* COLORI STATS */
        .c95 { background: #00ffff; } .c86 { background: #00ff00; } 
        .c71 { background: #ffff00; } .c61 { background: #ffaa00; } .c40 { background: #ff4d4d; color: #fff; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

function filtraGiocatori() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const team = document.getElementById('teamSelect').value;
    const pos = document.getElementById('posSelect').value;
    const list = document.getElementById('playerList');
    list.innerHTML = "";

    const filtered = players.filter(p => {
        return (p.nome.toLowerCase().includes(search)) && 
               (team === "" || p.team === team) && 
               (pos === "" || p.pos === pos);
    }).sort((a,b) => b.overall - a.overall);

    filtered.forEach(p => {
        const div = document.createElement('div');
        div.className = 'player-item';
        div.innerHTML = `<span>${p.nome} <small style="color:var(--blue)">(${p.team})</small></span> <span class="ovr-tag">${p.overall}</span>`;
        div.onclick = () => mostraScheda(p);
        list.appendChild(div);
    });
}

function mostraScheda(p) {
    document.getElementById('playerCard').style.display = 'block';
    document.getElementById('pName').innerText = p.nome;
    document.getElementById('pOverallBig').innerText = p.overall;
    document.getElementById('pFoto').src = `https://pesdb.net/pes2021/images/players/${p.id}.png`;
    
    document.getElementById('bioContent').innerHTML = `
        <div class="bio-item"><b>Nationality:</b> <img src="https://pesdb.net/pes2021/images/flags/${p.flag}.png" class="flag"> ${p.naz}</div>

        <div class="bio-item"><b>Age:</b> ${p.eta}</div>
        <div class="bio-item"><b>Size:</b> ${p.dim}</div>
        <div class="bio-item"><b>Foot:</b> ${p.piede}</div>
        <div class="bio-item"><b>Style:</b> ${p.stile}</div>
    `;

    let html = "";
    statsOrder.forEach(s => {
        let v = p.stats[s];
        let cl = v >= 95 ? "c95" : v >= 86 ? "c86" : v >= 71 ? "c71" : v >= 61 ? "c61" : "c40";
        html += `<div class="stat-row"><span>${s}</span><span class="stat-val ${cl}">${v}</span></div>`;
    });
    document.getElementById('statsContent').innerHTML = html;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
