<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES 21 DATABASE - OFFICIAL</title>
    <style>
        body { background: #0d0e12; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .navbar { background: #1a1c23; padding: 15px; border-bottom: 3px solid #007bff; text-align: center; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .container { max-width: 500px; margin: auto; }
        
        select { width: 100%; padding: 12px; background: #252836; color: white; border: 1px solid #444; border-radius: 5px; margin-bottom: 15px; font-size: 16px; border-left: 4px solid #007bff; }
        
        .player-list { background: #1a1c23; border-radius: 5px; border: 1px solid #333; margin-bottom: 20px; max-height: 180px; overflow-y: auto; }
        .player-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .player-item:hover { background: #252836; }

        /* SCHEDA GIOCATORE */
        .card { display: none; background: #1a1c23; border-radius: 10px; border: 1px solid #007bff; overflow: hidden; animation: slideIn 0.3s ease-out; }
        
        .header-main { display: flex; align-items: center; padding: 15px; background: linear-gradient(180deg, #1a1c23 0%, #0d0e12 100%); border-bottom: 1px solid #333; }
        .player-photo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #007bff; object-fit: cover; margin-right: 15px; background: #252836; }
        .player-title h2 { margin: 0; font-size: 20px; color: #fff; text-transform: uppercase; }
        .player-title p { margin: 5px 0 0 0; color: #007bff; font-weight: bold; font-size: 14px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; background: #16181f; font-size: 12px; }
        .info-item { color: #888; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .info-item span { color: #fff; font-weight: bold; display: block; font-size: 14px; margin-top: 2px; }

        .stats-container { padding: 10px 15px; }
        .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 14px; align-items: center; }
        
        .val { font-weight: bold; padding: 2px 8px; border-radius: 3px; color: #000; min-width: 30px; text-align: center; font-family: 'Courier New', monospace; }
        
        /* COLORI PES 21 */
        .c-cyan { background: #00FFFF; } .c-green { background: #00FF00; }
        .c-yellow { background: #FFFF00; } .c-orange { background: #FF9900; }
        .c-red { background: #FF0000; color: #fff; }

        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="navbar">PES 21 DB - CONVERTED</div>

<div class="container">
    <select id="teamSelect" onchange="caricaSquadra()">
        <option value="">Scegli Squadra...</option>
        <option value="Manchester City">Manchester City</option>
        <option value="Inter">Inter</option>
    </select>

    <div id="playerList" class="player-list"></div>

    <div id="playerCard" class="card">
        <div class="header-main">
            <img id="pFoto" src="" class="player-photo" alt="Foto">
            <div class="player-title">
                <h2 id="pName"></h2>
                <p id="pNaz">-</p>
            </div>
        </div>
        
        <div class="info-grid">
            <div class="info-item">Ruolo <span id="pRuolo">-</span></div>
            <div class="info-item">Età <span id="pEta">-</span></div>
            <div class="info-item">Piede <span id="pPiede">-</span></div>
            <div class="info-item">Altezza <span id="pAlt">-</span></div>
            <div class="info-item">Peso <span id="pPeso">-</span></div>
            <div class="info-item">Stile <span id="pStile">-</span></div>
        </div>

        <div class="stats-container" id="statsContent"></div>
    </div>
</div>

<script>
// DATABASE CON VALORI GIÀ CONVERTITI (Esempio Haaland da eFootball 26 -> PES 21)
const db = {
    "Manchester City": [
        { 
            nome: "E. HAALAND", 
            foto: "https://assets.mancity.com/dist/images/players/men/erling-haaland.png", // Link immagine reale
            naz: "Norvegia",
            eta: 25, 
            piede: "Sinistro", 
            ruolo: "P", 
            alt: "194 cm",
            peso: "88 kg",
            stile: "Uomo d'area",
            stats: {
                "Consapevolezza Offensiva": 95,
                "Controllo Palla": 79,
                "Dribbling": 76,
                "Finalizzazione": 98,
                "Velocità": 92,
                "Accelerazione": 85,
                "Potenza di tiro": 93,
                "Contatto Fisico": 96,
                "Equilibrio": 74,
                "Resistenza": 82
            } 
        }
    ],
    "Inter": [
        { 
            nome: "L. MARTÍNEZ", 
            foto: "https://www.inter.it/img/963852-500.png",
            naz: "Argentina",
            eta: 28, 
            piede: "Destro", 
            ruolo: "P", 
            alt: "174 cm",
            peso: "72 kg",
            stile: "Rapace d'area",
            stats: {
                "Consapevolezza Offensiva": 91,
                "Finalizzazione": 89,
                "Velocità": 84,
                "Contatto Fisico": 85,
                "Resistenza": 88
            }
        }
    ]
};

function caricaSquadra() {
    const team = document.getElementById('teamSelect').value;
    const list = document.getElementById('playerList');
    document.getElementById('playerCard').style.display = 'none';
    list.innerHTML = "";
    if(db[team]) {
        db[team].forEach((p, i) => {
            list.innerHTML += `<div class="player-item" onclick="mostraStat('${team}', ${i})">${p.nome} <span>➔</span></div>`;
        });
    }
}

function mostraStat(team, i) {
    const p = db[team][i];
    document.getElementById('pName').innerText = p.nome;
    document.getElementById('pFoto').src = p.foto;
    document.getElementById('pNaz').innerText = p.naz;
    document.getElementById('pRuolo').innerText = p.ruolo;
    document.getElementById('pEta').innerText = p.eta;
    document.getElementById('pPiede').innerText = p.piede;
    document.getElementById('pAlt').innerText = p.alt;
    document.getElementById('pPeso').innerText = p.peso;
    document.getElementById('pStile').innerText = p.stile;
    
    let html = "";
    for(let s in p.stats) {
        let v = p.stats[s];
        let cl = v >= 95 ? "c-cyan" : v >= 86 ? "c-green" : v >= 71 ? "c-yellow" : v >= 61 ? "c-orange" : "c-red";
        html += `<div class="stat-row"><span>${s}</span><span class="val ${cl}">${v}</span></div>`;
    }
    document.getElementById('statsContent').innerHTML = html;
    document.getElementById('playerCard').style.display = 'block';
}
</script>
</body>
</html>
