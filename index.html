<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES6 DATABASE</title>
    <style>
        body { background: #0d0e12; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 10px; }
        .navbar { background: #1a1c23; padding: 15px; border-bottom: 3px solid #007bff; text-align: center; font-weight: bold; margin-bottom: 15px; }
        select { width: 100%; padding: 12px; background: #252836; color: white; border: 1px solid #444; border-radius: 5px; margin-bottom: 10px; }
        .player-list { background: #1a1c23; border-radius: 5px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        .player-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; }
        .player-item:active { background: #252836; }
        
        /* SCHEDA STATS */
        .card { display: none; background: #1a1c23; padding: 15px; border-radius: 8px; border: 1px solid #007bff; }
        .stat-row { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #222; font-size: 14px; }
        .val { font-weight: bold; padding: 2px 6px; border-radius: 3px; color: #000; min-width: 25px; text-align: center; }
        
        /* COLORI */
        .c-cyan { background: #00FFFF; } .c-green { background: #00FF00; }
        .c-yellow { background: #FFFF00; } .c-orange { background: #FF9900; }
        .c-red { background: #FF0000; color: #fff; }
    </style>
</head>
<body>

<div class="navbar">PES6 DB - SERIE A</div>

<select id="teamSelect" onchange="loadTeam()">
    <option value="">Seleziona Squadra...</option>
    <option value="Inter">Inter</option>
</select>

<div id="playerList" class="player-list"></div>

<div id="playerCard" class="card">
    <h2 id="pName" style="text-align:center; color:#fff; margin-top:0;"></h2>
    <div id="statsContent"></div>
</div>

<script>
// IL TUO DATABASE FISSO
const database = {
    "Inter": [
        {
            nome: "LAUTARO MARTINEZ",
            stats: {"Attacco": 88, "Difesa": 45, "Equilibrio": 85, "Potenza Tiro": 82, "Velocità": 81, "Accelerazione": 84, "Tecnica": 87}
        },
        {
            nome: "NICOLÒ BARELLA",
            stats: {"Attacco": 76, "Difesa": 72, "Equilibrio": 80, "Potenza Tiro": 79, "Velocità": 83, "Accelerazione": 85, "Tecnica": 84}
        },
        {
            nome: "MARCUS THURAM",
            stats: {"Attacco": 84, "Difesa": 40, "Equilibrio": 88, "Potenza Tiro": 80, "Velocità": 89, "Accelerazione": 91, "Tecnica": 83}
        }
    ]
};

function loadTeam() {
    const team = document.getElementById('teamSelect').value;
    const list = document.getElementById('playerList');
    document.getElementById('playerCard').style.display = 'none';
    list.innerHTML = "";

    if(database[team]) {
        database[team].forEach((p, index) => {
            list.innerHTML += `<div class="player-item" onclick="showPlayer('${team}', ${index})">
                <span>${p.nome}</span>
                <span style="color:#007bff">➔</span>
            </div>`;
        });
    }
}

function showPlayer(team, index) {
    const p = database[team][index];
    document.getElementById('pName').innerText = p.nome;
    let html = "";

    for(let s in p.stats) {
        let v = p.stats[s];
        let cl = "c-red";
        if(v >= 95) cl = "c-cyan";
        else if(v >= 86) cl = "c-green";
        else if(v >= 71) cl = "c-yellow";
        else if(v >= 61) cl = "c-orange";

        html += `<div class="stat-row"><span>${s}</span><span class="val ${cl}">${v}</span></div>`;
    }

    document.getElementById('statsContent').innerHTML = html;
    document.getElementById('playerCard').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}
</script>
</body>
</html>
