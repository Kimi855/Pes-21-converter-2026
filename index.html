<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES6 DATABASE</title>
    <style>
        body { background: #0d0e12; color: #e0e0e0; font-family: sans-serif; padding: 10px; text-align: center; }
        .search-box { background: #1a1c23; padding: 20px; border-radius: 8px; border: 1px solid #007bff; margin-bottom: 20px; }
        input { width: 80%; padding: 12px; border-radius: 5px; border: none; font-size: 16px; }
        .val { font-weight: bold; padding: 2px 8px; border-radius: 3px; color: #000; }
        .c-cyan { background: #00FFFF; } .c-green { background: #00FF00; } 
        .c-yellow { background: #FFFF00; } .c-orange { background: #FF9900; } 
        .c-red { background: #FF0000; color: #fff; }
        .stat-item { display: flex; justify-content: space-between; background: #1a1c23; padding: 8px; margin: 2px; border-radius: 3px; font-size: 14px; text-align: left; }
        #playerCard { display:none; max-width: 500px; margin: auto; }
    </style>
</head>
<body>

<div class="search-box">
    <h2>PES6 DB CLONE</h2>
    <input type="number" id="pId" placeholder="Incolla ID (es. 108657)" onchange="loadPlayer(this.value)">
    <p style="font-size:12px; color: #666;">Dopo aver scritto l'ID, clicca fuori dal box</p>
</div>

<div id="status"></div>

<div id="playerCard">
    <h1 id="pName" style="color:#007bff"></h1>
    <div id="statsList"></div>
</div>

<script>
async function loadPlayer(id) {
    if(!id) return;
    const status = document.getElementById('status');
    const card = document.getElementById('playerCard');
    status.innerHTML = "⏳ Connessione in corso...";
    card.style.display = "none";

    // Usiamo il proxy CORS-ANYWHERE o ALLORIGINS
    const url = `https://pesdb.net/efootball/?id=${id}`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

    try {
        const res = await fetch(proxy);
        const json = await res.json();
        const html = json.contents;

        if(!html) throw new Error();

        const doc = new DOMParser().parseFromString(html, 'text/html');
        const name = doc.querySelector('.player_table td:nth-child(2)').innerText;
        document.getElementById('pName').innerText = name;

        let out = "";
        doc.querySelectorAll('tr').forEach(r => {
            const c = r.querySelectorAll('td');
            if(c.length >= 2) {
                const n = c[0].innerText.trim();
                const v = parseInt(c[1].innerText);
                if(!isNaN(v) && v >= 40) {
                    // Conversione
                    let p = v > 90 ? Math.floor(v * 0.94) : Math.floor(v * 0.96);
                    if(n.includes("Physical")) p += 7;
                    if(n.includes("Speed")) p -= 2;
                    p = Math.min(99, p);

                    // Colore
                    let cl = "c-red";
                    if(p >= 95) cl = "c-cyan";
                    else if(p >= 86) cl = "c-green";
                    else if(p >= 71) cl = "c-yellow";
                    else if(p >= 61) cl = "c-orange";

                    out += `<div class="stat-item"><span>${n}</span><span class="val ${cl}">${p}</span></div>`;
                }
            }
        });

        document.getElementById('statsList').innerHTML = out;
        card.style.display = "block";
        status.innerHTML = "✅ Caricato!";
    } catch (e) {
        status.innerHTML = "❌ Errore: Pesdb sta bloccando la connessione. Riprova tra 5 minuti.";
    }
}
</script>
</body>
</html>
