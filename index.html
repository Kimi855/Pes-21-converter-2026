<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES DATABASE 2026</title>
    <style>
        :root { --bg: #050608; --card: #11141a; --cyan: #00ffcc; --blue: #007bff; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; overflow-x: hidden; }
        
        .title-main { text-align: center; color: var(--cyan); font-size: 24px; font-weight: 900; letter-spacing: 2px; margin: 10px 0; text-transform: uppercase; }

        /* Filtri compatti */
        .search-area { background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; }
        select { flex: 1; padding: 10px; background: #1a1c23; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 13px; }

        /* Scheda compatta per far stare tutto */
        .player-card { display: none; background: #161920; border-radius: 10px; border: 1px solid var(--blue); padding: 10px; animation: fadeIn 0.3s; }
        
        .header-box { display: flex; align-items: flex-start; gap: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        
        /* Foto e Overall */
        .img-container { position: relative; width: 100px; height: 130px; flex-shrink: 0; }
        .p-img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; background: #000; border: 1px solid #444; }
        .p-ovr { position: absolute; top: -5px; left: -5px; width: 35px; height: 35px; background: #000; color: var(--cyan); border: 2px solid var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; z-index: 2; }

        .p-info-text { flex-grow: 1; }
        .p-name { font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; color: #fff; line-height: 1.1; }
        .p-sub { font-size: 12px; color: #aaa; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
        .flag { width: 22px; height: auto; border-radius: 2px; display: inline-block; }

        /* Stats Grid ultra compatta (3 colonne) */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; font-size: 11px; }
        .stat-item { background: #0d0e12; padding: 4px 6px; display: flex; justify-content: space-between; align-items: center; border-radius: 3px; border-bottom: 1px solid #222; }
        .val { font-weight: bold; width: 22px; text-align: center; border-radius: 2px; color: #000; font-size: 11px; }

        /* Livelli colore */
        .c95 { background: #00ffff; } .c86 { background: #00ff00; } 
        .c71 { background: #ffff00; } .c61 { background: #ffaa00; } .c40 { background: #ff4d4d; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="title-main">PES DATABASE 2026</div>

<div class="search-area">
    <div class="row">
        <select id="lSel" onchange="upTeams()"><option value="">Lega</option></select>
        <select id="tSel" onchange="upPlayers()"><option value="">Squadra</option></select>
    </div>
    <select id="pSel" onchange="render()"><option value="">Seleziona Giocatore</option></select>
</div>

<div id="card" class="player-card">
    <div class="header-box">
        <div class="img-container">
            <div id="outOvr" class="p-ovr"></div>
            <img id="outImg" src="" class="p-img">
        </div>
        <div class="p-info-text">
            <h2 id="outName" class="p-name"></h2>
            <div class="p-sub">
                <img id="outFlag" src="" class="flag"> 
                <span id="outNat"></span> | <span id="outPos" style="color:var(--cyan)"></span>
            </div>
            <div id="outBio" style="font-size:11px; color:#777; margin-top:5px; line-height:1.4;"></div>
        </div>
    </div>
    <div id="outStats" class="stats-grid"></div>
</div>

<script>
// DATABASE MASSIVO INIZIALE
const db = {
    "Serie A Enilive": {
        "Inter": [
            { n: "LAUTARO MARTÍNEZ", id: "108657", ovr: 92, naz: "Argentina", fl: "argentine-republic", pos: "CF", eta: 28, h: 174, p: "D", st: {"OA":93, "BC":86, "DRI":84, "FIN":92, "HEA":88, "SPD":84, "ACC":86, "POW":85, "CON":86, "STA":89, "DEF":52, "BAL":88} },
            { n: "NICOLÒ BARELLA", id: "108653", ovr: 90, naz: "Italy", fl: "italy", pos: "CMF", eta: 29, h: 172, p: "D", st: {"OA":82, "BC":88, "PAS":90, "LOF":86, "SPD":82, "ACC":85, "STA":96, "WIN":82, "AGG":88, "DRI":86, "FIN":75, "CON":74} }
        ],
        "Juventus": [
            { n: "D. VLAHOVIC", id: "126336", ovr: 89, naz: "Serbia", fl: "serbia", pos: "CF", eta: 26, h: 190, p: "S", st: {"OA":88, "FIN":91, "HEA":84, "POW":88, "SPD":83, "ACC":80, "STA":82, "CON":87, "BC":80, "DRI":78, "JUM":85, "BAL":75} }
        ],
        "Milan": [
            { n: "RAFAEL LEÃO", id: "126533", ovr: 91, naz: "Portugal", fl: "portugal", pos: "LWF", eta: 26, h: 188, p: "D", st: {"BC":90, "DRI":96, "FIN":84, "SPD":95, "ACC":94, "STA":80, "CON":85, "BAL":88, "OA":82, "PAS":78, "LOF":74, "POW":86} }
        ]
    },
    "Premier League": {
        "Manchester City": [
            { n: "E. HAALAND", id: "133543", ovr: 96, naz: "Norway", fl: "norway", pos: "CF", eta: 25, h: 194, p: "S", st: {"OA":96, "FIN":98, "POW":97, "SPD":95, "CON":97, "STA":84, "BC":81, "DRI":78, "HEA":85, "ACC":88, "JUM":88, "BAL":72} },
            { n: "K. DE BRUYNE", id: "44379", ovr: 93, naz: "Belgium", fl: "belgium", pos: "AMF", eta: 34, h: 181, p: "D", st: {"BC":91, "PAS":96, "LOF":95, "FIN":82, "SPD":76, "ACC":78, "STA":85, "OA":88, "DRI":86, "POW":92, "CUR":90, "BAL":80} }
        ]
    }
};

const lS = document.getElementById('lSel'), tS = document.getElementById('tSel'), pS = document.getElementById('pSel');

(function init() {
    Object.keys(db).forEach(l => lS.innerHTML += `<option value="${l}">${l}</option>`);
})();

function upTeams() {
    tS.innerHTML = '<option value="">Squadra</option>';
    if(lS.value) Object.keys(db[lS.value]).forEach(t => tS.innerHTML += `<option value="${t}">${t}</option>`);
}

function upPlayers() {
    pS.innerHTML = '<option value="">Giocatore</option>';
    if(tS.value) db[lS.value][tS.value].forEach((p, i) => pS.innerHTML += `<option value="${i}">${p.n}</option>`);
}

function render() {
    const p = db[lS.value][tS.value][pS.value];
    if(!p) return;
    document.getElementById('card').style.display = 'block';
    document.getElementById('outName').innerText = p.n;
    document.getElementById('outOvr').innerText = p.ovr;
    document.getElementById('outImg').src = `https://pesdb.net/pes2021/images/players/${p.id}.png`;
    // Fix Bandiere: URL corretto per pesdb
    document.getElementById('outFlag').src = `https://pesdb.net/pes2021/images/flags/${p.fl}.png`;
    document.getElementById('outNat').innerText = p.naz;
    document.getElementById('outPos').innerText = p.pos;
    document.getElementById('outBio').innerText = `Età: ${p.eta} | Altezza: ${p.h}cm | Piede: ${p.p}`;

    let h = "";
    for(let s in p.st) {
        let v = p.st[s], c = v >= 95 ? "c95" : v >= 86 ? "c86" : v >= 71 ? "c71" : v >= 61 ? "c61" : "c40";
        h += `<div class="stat-item"><span>${s}</span><span class="val ${c}">${v}</span></div>`;
    }
    document.getElementById('outStats').innerHTML = h;
}
</script>
</body>
</html>
