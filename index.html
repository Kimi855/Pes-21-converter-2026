<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES 21 Stats Database</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --cyan: #00ffff; --green: #00ff00; --yellow: #ffff00; --orange: #ffaa00; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        
        /* Input Area Mobile */
        .controls { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }

        /* Card Style pes6.es */
        #playerCard { display: none; background: var(--card); border-radius: 12px; border: 1px solid #30363d; overflow: hidden; }
        .header-card { display: flex; align-items: center; padding: 15px; gap: 15px; border-bottom: 1px solid #30363d; background: #000; }
        .p-img { width: 90px; height: 120px; border: 1px solid #333; border-radius: 5px; object-fit: cover; }
        .p-name { font-size: 20px; font-weight: 900; text-transform: uppercase; color: var(--cyan); }

        /* Tabella Stats */
        .stats-list { display: flex; flex-direction: column; padding: 5px; }
        .s-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid #21262d; }
        .s-label { font-size: 13px; color: #8b949e; text-transform: uppercase; }
        .s-val { font-family: monospace; font-weight: 900; font-size: 16px; width: 35px; text-align: center; border-radius: 3px; color: #000; }

        /* Classi Colore */
        .c-cyan { background: var(--cyan); }
        .c-green { background: var(--green); }
        .c-yellow { background: var(--yellow); }
        .c-orange { background: var(--orange); }
        .c-red { background: var(--red); color: white; }
    </style>
</head>
<body>

<div class="controls">
    <input type="number" id="idIn" placeholder="ID Giocatore (es. 108657)">
    <input type="text" id="nameIn" placeholder="Nome Giocatore">
    <input type="text" id="infoIn" placeholder="NAZ | RUOLO | ETÀ | ALTEZZA">
    <input type="text" id="statsIn" placeholder="Stats separate da virgola (es. 85,90,75...)">
    <button onclick="build()">GENERA DATABASE</button>
</div>

<div id="playerCard">
    <div class="header-card">
        <img id="outImg" class="p-img" src="">
        <div>
            <div id="outName" class="p-name">---</div>
            <div id="outInfo" style="font-size:12px; color:#ccc;">---</div>
        </div>
    </div>
    <div id="outStats" class="stats-list"></div>
</div>

<script>
const statNames = [
    "Attacco", "Controllo Palla", "Dribbling", "Possesso Stretto", "Passaggio Basso", "Passaggio Alto",
    "Finalizzazione", "Colpo di Testa", "Calci Piazzati", "Effetto", "Velocità", "Accelerazione", 
    "Potenza Tiro", "Elevazione", "Contatto Fisico", "Equilibrio", "Resistenza", "Difesa", 
    "Recupero Pallone", "Aggressività", "Portiere (Cons.)", "Presa PT", "Respinta PT", "Riflessi PT", 
    "Rinvio PT", "Uso Piede Debole", "Prec. Piede Debole", "Forma Fisica", "Res. Infortuni"
];

function getColor(v, label) {
    v = parseInt(v);
    // Logica Speciale Piede (1-4)
    if (label.includes("Piede")) {
        if (v >= 4) return "c-cyan";
        if (v == 3) return "c-green";
        if (v == 2) return "c-yellow";
        return "c-red";
    }
    // Logica Speciale Infortuni (1-3)
    if (label.includes("Infortuni")) {
        if (v >= 3) return "c-cyan";
        if (v == 2) return "c-yellow";
        return "c-red";
    }
    // Scala PES 21 (40-99)
    if (v >= 90) return "c-cyan";
    if (v >= 80) return "c-green";
    if (v >= 75) return "c-yellow";
    if (v >= 70) return "c-orange";
    return "c-red";
}

function build() {
    const id = document.getElementById('idIn').value;
    const stats = document.getElementById('statsIn').value.split(',');
    
    document.getElementById('playerCard').style.display = 'block';
    document.getElementById('outImg').src = `https://efootballhub.net/static/players/efootball26/${id}.png`;
    document.getElementById('outName').innerText = document.getElementById('nameIn').value;
    document.getElementById('outInfo').innerText = document.getElementById('infoIn').value;

    let html = "";
    statNames.forEach((name, i) => {
        let val = stats[i] ? stats[i].trim() : "40";
        html += `<div class="s-row">
                    <span class="s-label">${name}</span>
                    <span class="s-val ${getColor(val, name)}">${val}</span>
                 </div>`;
    });
    document.getElementById('outStats').innerHTML = html;
}
</script>
</body>
</html>
